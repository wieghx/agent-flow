version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - errcheck
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      checks: ["all", "-SA1019", "-ST1000", "-ST1020", "-ST1021"]  # style comment checks are noisy on this codebase; keep core static analysis
  exclusions:
    rules:
      - path: .*_test\.go$
        linters:
          - errcheck
      - path: api/v1alpha1/groupversion_info\.go
        text: "SA1019"
        linters:
          - staticcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0