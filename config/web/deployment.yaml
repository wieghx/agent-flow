---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: agent-flow-system
  labels:
    app.kubernetes.io/name: agent-flow
    app.kubernetes.io/component: web
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: web
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
    spec:
      containers:
      - name: web
        image: kind-local:5000/minagflow/agent-flow-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: API_URL
          value: "http://agentflow-manager.agent-flow-system.svc.cluster.local:8082"
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
        volumeMounts:
        - name: task-outputs
          mountPath: /data/outputs
      volumes:
      - name: task-outputs
        persistentVolumeClaim:
          claimName: task-outputs
      serviceAccountName: default
