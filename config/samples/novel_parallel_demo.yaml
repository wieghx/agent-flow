apiVersion: agentflow.io/v1alpha1
kind: Workflow
metadata:
  name: novel-parallel-demo
  namespace: default
  labels:
    agentflow.io/template: novel-outline-chapters
spec:
  prompt: |
    写一部长篇荒岛生存小说，主角林峰是户外教练。
    全书 100 章，分四幕：坠海求生(1-20)、营地内斗(21-45)、
    探索岛屿(46-75)、逃离与真相(76-100)。强调资源匮乏与团队冲突。
  template: novel-outline-chapters
  params:
    chapterCount: "100"
    wordsPerChapter: "2500"
    chapterSegmentMode: "true"
    chapterSegments: "5"
    segmentWords: "500"
    contextChapters: "5"
    volumeSize: "25"
    arcInterval: "10"
    qualityThreshold: "72"
    taskMaxRetries: "6"
  execution:
    mode: parallel
    maxParallel: 8
    chapterMode: pipeline
    chapterPipeline: 8
    stepMaxRetries: 3
    stepRetryBaseDelaySec: 30
    stepRetryMaxDelaySec: 300
    pauseOnStepFail: false
    autoApprove: true
  workspace:
    pvc: task-outputs
    # 集群默认产出: /data/outputs/workflows/<namespace>/<name>