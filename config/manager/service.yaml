---
apiVersion: v1
kind: Service
metadata:
  name: manager
  namespace: agent-flow-system
  labels:
    app.kubernetes.io/name: agent-flow
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    control-plane: controller-manager
  ports:
  - name: http-api
    port: 8082
    targetPort: 8082
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP