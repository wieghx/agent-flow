name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: go test ./... -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/planner ./cmd/planner
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/worker-agent ./cmd/worker-agent
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/mcp-server ./cmd/mcp-server