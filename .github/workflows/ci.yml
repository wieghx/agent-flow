name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Go Test & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: go test ./... -count=1

      - name: go vet
        run: go vet ./...

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  build-go:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/planner ./cmd/planner
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/worker-agent ./cmd/worker-agent
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/mcp-server ./cmd/mcp-server

  e2e:
    name: E2E Pipeline (mock LLM)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: E2E novel pipeline
        run: go test ./internal/e2e/... -count=1 -v

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: npm run build
        working-directory: web
        run: npm run build